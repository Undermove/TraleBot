apiVersion: v1
kind: Service
metadata:
  name: tralebot-service
  annotations:
    prometheus.io/port: "http"
    prometheus.io/scrape: "true"
  labels:
    app: tralebot
    app.kubernetes.io/part-of: tralebot
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 1402
      name: http
  selector:
    app: tralebot

---

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    heritage: Helm
    release: kube-prom-stack
  name: tralebot
  namespace: tralebot-prod
spec:
  endpoints:
    - path: /metrics
      port: http
  namespaceSelector:
    matchNames:
      - tralebot-prod
  selector:
    matchLabels:
      app: tralebot
      app.kubernetes.io/part-of: tralebot

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tralebot-deployment
spec:
  replicas: 2
  # Rolling update keeps the old pod running until the new one passes
  # readiness checks. If the new build crashes on startup (e.g. bad config),
  # K8s will fail the rollout and leave the old pod serving traffic — no outage.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tralebot
  template:
    metadata:
      labels:
        app: tralebot
      annotations:
        kubectl.kubernetes.io/restartedAt: "$RUN_NUMBER"
    spec:
      containers:
        - name: tralebot-container
          image: undermove/tralebot:$RUN_NUMBER
          ports:
            - containerPort: 1402
          # Readiness probe gates traffic on /healthz — until it returns 200
          # the pod isn't added to the Service. Combined with maxUnavailable: 0
          # this means a crash-looping new pod can never replace a healthy old one.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 1402
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness probe restarts the pod if it stops responding (deadlock etc).
          # More forgiving than readiness — only kicks in for already-running pods.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 1402
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: ConnectionStrings__TraleBotDb
              valueFrom:
                secretKeyRef:
                  name: tralebot-secrets
                  key: TRALEBOT_DB_CONNECTION_STRING
            - name: BotConfiguration__WebhookToken
              valueFrom:
                secretKeyRef:
                  name: tralebot-secrets
                  key: TRALEBOT_WEBHOOK_TOKEN
            - name: BotConfiguration__Token
              valueFrom:
                secretKeyRef:
                  name: tralebot-secrets
                  key: TRALEBOT_CONFIGURATION_TOKEN
            - name: BotConfiguration__PaymentProviderToken
              valueFrom:
                secretKeyRef:
                  name: tralebot-secrets
                  key: TRALEBOT_PAYMENT_PROVIDER_TOKEN
            - name: OpenAiConfiguration__ApiKey
              valueFrom:
                secretKeyRef:
                  name: tralebot-secrets
                  key: TRALEBOT_OPENAI_TOKEN
            - name: GoogleTranslateApiConfiguration__ApiKeyBase64
              valueFrom:
               secretKeyRef:
                 name: tralebot-secrets
                 key: TRALEBOT_GOOGLE_TRANSLATE_TOKEN
            - name: BotConfiguration__HostAddress
              valueFrom:
                secretKeyRef:
                  name: tralebot-secrets
                  key: TRALEBOT_SERVER_HOST
            # Mini-app feature flag. When true, the bot:
            # - sets the chat menu button to a WebApp button (one-tap mini-app launch)
            # - shows the WebApp button in the /menu inline keyboard
            # - exposes the "💳 Оплатить подписку" deep link
            # When false, the SPA is still served at the host root (landing page),
            # but no menu buttons are set in Telegram for users.
            - name: BotConfiguration__MiniAppEnabled
              value: "true"

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tralebot-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - tralebot.com
      secretName: tls-secret
  rules:
    - host: tralebot.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tralebot-service
                port:
                  number: 80

---

apiVersion: v1
kind: Secret
metadata:
  name: tralebot-secrets
type: Opaque
data:
  TRALEBOT_DB_CONNECTION_STRING: $TRALEBOT_DB_CONNECTION_STRING
  TRALEBOT_WEBHOOK_TOKEN: $TRALEBOT_WEBHOOK_TOKEN
  TRALEBOT_CONFIGURATION_TOKEN: $TRALEBOT_CONFIGURATION_TOKEN
  TRALEBOT_PAYMENT_PROVIDER_TOKEN: $TRALEBOT_PAYMENT_PROVIDER_TOKEN
  TRALEBOT_OPENAI_TOKEN: $TRALEBOT_OPENAI_TOKEN
  TRALEBOT_GOOGLE_TRANSLATE_TOKEN: $TRALEBOT_GOOGLE_TRANSLATE_TOKEN
  TRALEBOT_SERVER_HOST: $TRALEBOT_SERVER_HOST

---


