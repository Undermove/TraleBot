services:
  bombora-agents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bombora-agents
    restart: unless-stopped
    environment:
      # Auth: подписка ИЛИ API-ключ
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO_URL=${REPO_URL:-https://github.com/undermove/TraleBot.git}
      - GIT_USER_NAME=${GIT_USER_NAME:-Bombora Agents}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-agents@tralebot.com}
      # Timezone
      - TZ=Asia/Tbilisi
      # Limits
      - MAX_TURNS=${MAX_TURNS:-30}
      # Testcontainers: run sibling containers on the host Docker daemon.
      # RYUK_DISABLED — socket proxy can't look up ryuk by id after creation
      # (returns 404), so disable the resource reaper.
      # HOST_OVERRIDE=host.docker.internal — test client inside this container
      # must connect to test Postgres via the host's docker-desktop bridge,
      # not via `localhost` (which points back to bombora-agents itself).
      - TESTCONTAINERS_RYUK_DISABLED=true
      - TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal
    volumes:
      - agent-logs:/logs
      - agent-workspace:/workspace
      # Host Docker socket — lets Testcontainers in the QA agent spawn sibling
      # containers (Postgres, etc.) for IntegrationTests. Without this mount
      # `dotnet test` skips all IntegrationTests because Testcontainers can't
      # reach a Docker daemon from inside bombora-agents.
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      # TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal resolves correctly
      # on Docker Desktop (Mac/Windows) but not on Linux Docker Engine without
      # this entry. "host-gateway" resolves to the host machine's internal IP
      # (docker0 bridge gateway, typically 172.17.0.1 on Linux).
      - "host.docker.internal:host-gateway"

volumes:
  agent-logs:
    driver: local
  agent-workspace:
    driver: local
